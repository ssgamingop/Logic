<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Crackit Desktop Helper</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #1e1e1e;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    h1 {
      color: #61dafb;
    }
    .status {
      padding: 10px 20px;
      background-color: rgba(97, 218, 251, 0.1);
      border: 1px solid #61dafb;
      border-radius: 8px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Crackit Desktop Helper</h1>
  <p>This window is completely hidden from screen recording and screenshots.</p>
  <div class="status">
    Status: Protected 🛡️
  </div>
  <p style="margin-top: 40px; font-size: 14px; opacity: 0.7;">
    Note: Try taking a screenshot or recording the screen. This window will appear completely blank or transparent to the capturing software.
  </p>
</body>
</html>
