<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crackit Extractor</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      width: 250px;
      padding: 20px;
      margin: 0;
      text-align: center;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #8b5cf6;
    }
    p {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
    }
    .status {
      display: inline-block;
      margin-top: 15px;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .status.disconnected {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border-color: rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body>
  <h1>Crackit Extractor</h1>
  <p>This extension runs invisibly in the background to extract questions from your browser.</p>
  <p>Use your Desktop App to trigger scans!</p>
  
  <div class="status" id="wsStatus">Checking connection...</div>

  <script src="popup.js"></script>
</body>
</html>
